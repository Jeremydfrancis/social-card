<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link href="https://fonts.googleapis.com" rel="stylesheet" />

    <title>Frontend Mentor | Social links profile</title>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      :root {
        /* COLORS */
        --green: oklch(87% 0.233 129);
        --white: oklch(100% 0 0);
        --grey-light: oklch(34% 0 0);
        --grey-med: oklch(22% 0 0);
        --grey-bg: oklch(15% 0 0);
        /* FONT STYLES */
        --font-weight-400: 400;
        --font-weight-600: 600;
        --font-weight-700: 700;
        --font-fam: "Inter", sans-serif;
      }
      body {
        margin: 0;
        padding: 0 1rem;
        display: grid;
        align-items: center;
        justify-content: center;
        width: 100dvw;
        height: 100dvh;
        background-color: var(--grey-bg);
        color: white;
        font-family: var(--font-fam);
        text-align: center;
        font-size: 14px;
        line-height: 1.5;
        & .sub-text {
          font-size: 13px !important;
        }
        & .card {
          display: flex;
          flex-direction: column;
          width: 350px;
          background-color: var(--grey-med);
          border-radius: 15px;
          padding: 1.5rem 2rem;

          & .info {
            display: grid;
            gap: 0.3rem;
            & .info-cont {
              padding: 1rem;
            }
          }

          & img {
            object-fit: cover;
            width: 30%;
            height: auto;
            border-radius: 50%;
            margin-bottom: 1rem;
          }
          & h1 {
            font-weight: 600;
            font-size: 20px;
            margin: 0;
          }
          & p {
            font-size: 14px;
            font-weight: var(--font-weight-400);
            margin: 0;
            & span {
              color: var(--green);
              font-weight: 700;
              font-size: 12px;
            }
          }
          & ul {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            padding: 0;
            width: 100%;
          }

          & li {
            list-style: none;
            background-color: var(--grey-light);
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            font-weight: 700;
          }
          & li:hover {
            color: var(--grey-med);
            background-color: var(--green);
            cursor: pointer;
            caret-color: black;
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div><img src="avatar-jessica.jpeg" alt="" /></div>

      <div class="info">
        <h1>Jessica Randall</h1>
        <p><span class="highlight">London, United Kingdom</span></p>
        <div class="info-cont">
          <p class="sub-text">"Front-end developer and avid reader."</p>
        </div>
      </div>

      <div>
        <ul>
          <li>GitHub</li>
          <li>Frontend Mentor</li>
          <li>LinkedIn</li>
          <li>Twitter</li>
          <li>Instagram</li>
        </ul>
      </div>
    </main>
  </body>
</html>
